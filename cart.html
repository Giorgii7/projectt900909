<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-3 fixed-top">
    <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Home</a>
            </div>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="cart.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        class="bi bi-cart4" viewBox="0 0 16 16">
                        <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l.5 2H5V5zM6 5v2h2V5zm3 0v2h2V5zm3 0v2h1.36l.5-2zm1.11 3H12v2h.61zM11 8H9v2h2zM8 8H6v2h2zM5 8H3.89l.5 2H5zm0 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 0 0 1-4 0"/>
                    </svg>
                    <span class="badge bg-danger" id="quantity"></span>
                </a>
            </div>
        </div>
    </div>
</nav>

<br><br>

<div class="container mt-5">
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>#</th>
                <th>სახელი</th>
                <th>ფასი</th>
                <th>რაოდენობა</th>
                <th>ქმედება</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
function loadQuantity() {
    fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
    .then(res => res.json())
    .then(data => {
        document.getElementById("quantity").textContent = data.length;
    });
}

loadQuantity();

fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
.then(res => res.json())
.then(products => {
    products.forEach((product, index) => {

        let tr = document.createElement("tr");

        let td1 = document.createElement("td");
        td1.textContent = index + 1;

        let td2 = document.createElement("td");
        td2.textContent = product.product.name;

        let img = document.createElement("img");
        img.src = product.product.image;
        img.className = "img-thumbnail rounded-5";
        img.style.width = "50px";
        img.style.marginLeft = "20px";

        td2.appendChild(img);

        let td3 = document.createElement("td");
        td3.textContent = product.product.price + "₾";

        let td4 = document.createElement("td");
        td4.textContent = product.quantity;

        let td5 = document.createElement("td");
        let deleteBtn = document.createElement("button");
        deleteBtn.className = "btn btn-danger";

        let icon = document.createElement("i");
        icon.className = "fa fa-trash";

        deleteBtn.appendChild(icon);

        deleteBtn.onclick = function () {
            let row = this.closest("tr");

            Swal.fire({
                title: "დარწმუნებული ხარ?",
                text: "პროდუქტი წაიშლება",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "დიახ",
                cancelButtonText: "გაუქმება"
            }).then((result) => {
                if (result.isConfirmed) {
                    axios.delete("https://restaurant.stepprojects.ge/api/Baskets/DeleteProduct/" + product.product.id)
                    .then(() => {
                        row.remove();
                        loadQuantity();
                    });
                }
            });
        };

        td5.appendChild(deleteBtn);

        tr.append(td1, td2, td3, td4, td5);
        document.querySelector("tbody").appendChild(tr);
    });
});
</script>

</body>
</html>
