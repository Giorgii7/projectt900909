<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
    background: linear-gradient(135deg, #3dbc16, #ff416c);
    min-height: 100vh;
    
}


.filter-box{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}


.card{
    border-radius: 20px;
    overflow: hidden;
    transition: 0.4s;
}

.card:hover{
    transform: translateY(-10px) scale(1.03);
}

.card img{
    height: 180px;
    object-fit: cover;
}

/* BADGES */
.badge-top{
    position: absolute;
    top: 10px;
    left: 10px;
}
.aa{
    text-decoration: dashed;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="aa" href="index.html"><span class="navbar-brand">🍔 Menu</span></a>
        <a href="cart.html" class="text-white">
            🛒 <span id="quantity" class="badge bg-danger"></span>
        </a>
    </div>
</nav>

<br><br><br>

<!-- FILTER -->
<div class="container mt-4">
    <div class="filter-box text-center">

        <h5>🌶️ სიმწარე: <span id="rangeValue">5</span></h5>
        <input type="range" min="1" max="5" value="5" class="form-range" id="spicyRange">

        <div class="mt-3">
            <label class="me-3">
                <input type="checkbox" id="withNuts"> 🥜 თხილით
            </label>

            <label>
                <input type="checkbox" id="noNuts"> ❌ უთხილოთ
            </label>
        </div>

        <button class="btn btn-light mt-3" onclick="applyFilter()">გაფილტრე</button>
        <button class="btn btn-dark mt-3" onclick="resetFilter()">Reset</button>

    </div>
</div>

<!-- PRODUCTS -->
<div class="container mt-4">
    <div class="row gy-4"></div>
</div>

<script>
let allProducts = [];

function loadQuantity() {
    fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
    .then(res => res.json())
    .then(data => {
        document.getElementById("quantity").textContent = data.length;
    });
}
loadQuantity();

// SLIDER
const range = document.getElementById("spicyRange");
const rangeValue = document.getElementById("rangeValue");

range.oninput = () => {
    rangeValue.textContent = range.value;
};

// FETCH
fetch("https://restaurant.stepprojects.ge/api/Products/GetAll")
.then(res => res.json())
.then(products => {

    allProducts = products.map(p => ({
        ...p,
        spicyLevel: Math.floor(Math.random() * 5) + 1,
        hasNuts: Math.random() > 0.5   // შემთხვევითი true/false
    }));

    renderProducts(allProducts);
});

// RENDER
function renderProducts(products){
    const row = document.querySelector(".row");
    row.innerHTML = "";

    products.forEach(product => {

        let col = document.createElement("div");
        col.className = "col-md-3";

        let card = document.createElement("div");
        card.className = "card position-relative";

        // spicy badge
        let spicy = document.createElement("span");
        spicy.className = "badge bg-danger badge-top";
        spicy.textContent = "🌶️ " + product.spicyLevel;

        // nuts badge
        let nuts = document.createElement("span");
        nuts.className = "badge bg-warning badge-top";
        nuts.style.left = "70px";
        nuts.textContent = product.hasNuts ? "🥜" : "🚫🥜";

        let img = document.createElement("img");
        img.src = product.image;

        let body = document.createElement("div");
        body.className = "card-body";

        let name = document.createElement("h6");
        name.textContent = product.name;

        let price = document.createElement("p");
        price.innerHTML = `<b>${product.price}₾</b>`;

        let btn = document.createElement("button");
        btn.className = "btn btn-primary w-100";
        btn.textContent = "კალათაში დამატება";

        btn.onclick = function(){
            fetch("https://restaurant.stepprojects.ge/api/Baskets/AddToBasket", {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify({
                    quantity:1,
                    price:product.price,
                    productId:product.id
                })
            })
            .then(()=>{
                Swal.fire("დაემატა!", "", "success");
                loadQuantity();
            });
        };

        body.appendChild(name);
        body.appendChild(price);
        body.appendChild(btn);

        card.appendChild(spicy);
        card.appendChild(nuts);
        card.appendChild(img);
        card.appendChild(body);
        col.appendChild(card);

        row.appendChild(col);
    });
}

// FILTER
function applyFilter(){

    let maxSpicy = parseInt(range.value);
    let withNuts = document.getElementById("withNuts").checked;
    let noNuts = document.getElementById("noNuts").checked;

    let filtered = allProducts.filter(p => {

        // spicy
        if(p.spicyLevel > maxSpicy) return false;

        // nuts
        if(withNuts && !p.hasNuts) return false;
        if(noNuts && p.hasNuts) return false;

        return true;
    });

    renderProducts(filtered);
}

// RESET
function resetFilter(){
    renderProducts(allProducts);
    range.value = 5;
    rangeValue.textContent = 5;
    document.getElementById("withNuts").checked = false;
    document.getElementById("noNuts").checked = false;
}
</script>

</body>
</html>
